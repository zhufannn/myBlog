<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="枕月听风——凡心自持，敏思向阳，熙然安生。Vue3 与 TypeScript 构建的个人博客。"
    />
    <title>枕月听风</title>
    <link rel="icon" href="/pika.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(() => {
        console.log('personal-blog-dark', localStorage.getItem('personal-blog-dark'))
        try {
          if (localStorage.getItem('personal-blog-dark') === 'dark') {
            document.documentElement.classList.add('theme-dark')
          } else {
            document.documentElement.classList.remove('theme-dark')
          }
        } catch (_) {
          document.documentElement.classList.remove('theme-dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
